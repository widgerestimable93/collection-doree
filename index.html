/* ==========================================================================

:root {

.container { max-width:1280px; margin:0 auto; padding:0 24px; }

.signature-divider { display:flex; align-items:center; justify-content:center; gap:12px; margin:24px 0; }

.site-header { position:sticky; top:0; z-index:100; display:flex; align-items:center; justify-content:space-between; padding:18px 24px; background:rgba(11,11,11,0.78); backdrop-filter:blur(14px); border-bottom:1px solid rgba(212,175,55,0.18); }
.logo { font-family:var(--font-display); font-size:1.5rem; letter-spacing:0.08em; display:flex; align-items:baseline; gap:6px; }

.nav-links { display:flex; gap:32px; list-style:none; font-size:0.85rem; letter-spacing:0.06em; text-transform:uppercase; }
.nav-links a { position:relative; padding-bottom:6px; transition:color var(--transition); }
.nav-links a::after { content:''; position:absolute; left:0; bottom:0; width:0; height:1px; background:var(--or); transition:width var(--transition); }
.nav-links a:hover::after, .nav-links a.active::after { width:100%; }

.header-actions { display:flex; align-items:center; gap:18px; }
.btn-icon { width:38px; height:38px; display:flex; align-items:center; justify-content:center; border:1px solid rgba(212,175,55,0.3); border-radius:50%; transition:border-color var(--transition), background var(--transition); }

.mobile-toggle { display:none; }
@media (max-width:860px) { .nav-links { display:none; } .mobile-toggle { display:flex; } .nav-links.open { display:flex; position:absolute; top:100%; left:0; right:0; flex-direction:column; background:var(--noir); padding:20px; gap:16px; border-bottom:1px solid rgba(212,175,55,0.18); } }

.btn { display:inline-flex; align-items:center; justify-content:center; gap:8px; padding:14px 32px; font-size:0.82rem; letter-spacing:0.08em; text-transform:uppercase; border-radius:var(--radius); transition:transform var(--transition), box-shadow var(--transition), background var(--transition); }
.btn-primary { background:var(--gradient-or); color:var(--noir); font-weight:500; }
.btn-primary:hover { transform:translateY(-2px); box-shadow:0 12px 30px -10px rgba(212,175,55,0.5); }

.hero { position:relative; min-height:78vh; display:flex; align-items:center; overflow:hidden; }
.hero::before { content:''; position:absolute; inset:0; background:radial-gradient(circle at 80% 20%, rgba(212,175,55,0.10), transparent 50%), radial-gradient(circle at 10% 80%, rgba(212,175,55,0.06), transparent 45%); pointer-events:none; }
.hero-content { position:relative; z-index:2; max-width:640px; animation:heroReveal 1s var(--transition) both; }

.hero-eyebrow { color:var(--or); font-size:0.8rem; letter-spacing:0.2em; text-transform:uppercase; margin-bottom:18px; }

.section { padding:90px 0; }

.section-eyebrow { color:var(--or); font-size:0.78rem; letter-spacing:0.2em; text-transform:uppercase; }
.section-heading h2 { font-size:clamp(1.9rem,4vw,2.6rem); margin-top:10px; }
.section-heading p { color:var(--gris-texte); margin-top:14px; }

.glass { background:rgba(255,255,255,0.03); border:1px solid rgba(212,175,55,0.15); backdrop-filter:blur(10px); border-radius:var(--radius); }

.products-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:28px; }
@media (max-width:1100px) { .products-grid { grid-template-columns:repeat(3,1fr); } }
@media (max-width:760px) { .products-grid { grid-template-columns:repeat(2,1fr); gap:16px; } }

.product-card { position:relative; background:var(--noir-soft); border:1px solid rgba(212,175,55,0.12); border-radius:var(--radius); overflow:hidden; transition:transform var(--transition), box-shadow var(--transition), border-color var(--transition); }
.product-card:hover { transform:translateY(-6px); box-shadow:var(--shadow-card); border-color:rgba(212,175,55,0.4); }
.product-card .badge { position:absolute; top:14px; left:14px; z-index:2; background:var(--gradient-or); color:var(--noir); font-size:0.68rem; letter-spacing:0.05em; text-transform:uppercase; padding:5px 12px; border-radius:2px; }
.product-card .fav-btn { position:absolute; top:12px; right:12px; z-index:2; width:34px; height:34px; display:flex; align-items:center; justify-content:center; border-radius:50%; background:rgba(11,11,11,0.55); border:1px solid rgba(212,175,55,0.3); transition:background var(--transition); }

.product-image-wrap { aspect-ratio:1/1; overflow:hidden; background:#1c1a16; cursor:pointer; }
.product-image-wrap img { width:100%; height:100%; object-fit:cover; transition:transform 0.6s var(--transition); }
.product-card:hover .product-image-wrap img { transform:scale(1.06); }

.product-actions { display:flex; gap:8px; margin-top:16px; }
.product-actions .btn { flex:1; padding:10px 0; font-size:0.72rem; }

.toolbar { display:flex; flex-wrap:wrap; gap:14px; align-items:center; margin-bottom:36px; }
.search-input { flex:1; min-width:220px; padding:13px 18px; background:var(--noir-soft); border:1px solid rgba(212,175,55,0.2); color:var(--blanc-casse); border-radius:var(--radius); font-family:inherit; }
.search-input:focus { border-color:var(--or); }
.select-filter { padding:13px 16px; background:var(--noir-soft); border:1px solid rgba(212,175,55,0.2); color:var(--blanc-casse); border-radius:var(--radius); font-family:inherit; }

.site-footer { border-top:1px solid rgba(212,175,55,0.15); padding:60px 0 30px; color:var(--gris-texte); font-size:0.9rem; }
.footer-grid { display:grid; grid-template-columns:2fr 1fr 1fr 1fr; gap:40px; margin-bottom:50px; }
@media (max-width:760px) { .footer-grid { grid-template-columns:1fr 1fr; } }
.footer-grid h4 { color:var(--blanc-casse); font-size:0.95rem; margin-bottom:16px; text-transform:uppercase; letter-spacing:0.06em; }
.footer-grid ul { list-style:none; display:flex; flex-direction:column; gap:10px; }
.footer-grid a:hover { color:var(--or); }
.footer-bottom { text-align:center; padding-top:24px; border-top:1px solid rgba(212,175,55,0.1); font-size:0.78rem; }

.empty-state, .loading-state { text-align:center; padding:60px 0; color:var(--gris-texte); }
.skeleton { background:linear-gradient(90deg,var(--noir-soft) 25%,#221f1a 37%,var(--noir-soft) 63%); background-size:400% 100%; animation:skeletonLoad 1.4s ease infinite; border-radius:var(--radius); }
@keyframes skeletonLoad { 0%{background-position:100% 50%;} 100%{background-position:0 50%;} }

/* Page produit */
.product-page { display:grid; grid-template-columns:1fr 1fr; gap:60px; align-items:start; }
@media (max-width:860px) { .product-page { grid-template-columns:1fr; gap:32px; } }
.gallery-main { aspect-ratio:1/1; background:var(--noir-soft); border-radius:var(--radius); overflow:hidden; cursor:zoom-in; }
.gallery-main img { width:100%; height:100%; object-fit:cover; }
.gallery-thumbs { display:flex; gap:10px; margin-top:12px; }
.gallery-thumbs img { width:70px; height:70px; object-fit:cover; border-radius:var(--radius); border:1px solid rgba(212,175,55,0.15); cursor:pointer; }
.gallery-thumbs img.active { border-color:var(--or); }
.breadcrumb { font-size:0.8rem; color:var(--gris-texte); margin-bottom:24px; }
.breadcrumb a:hover { color:var(--or); }
.qty-control { display:flex; align-items:center; gap:14px; margin:22px 0; }
.qty-control button { width:36px; height:36px; border:1px solid rgba(212,175,55,0.3); border-radius:50%; }
.lightbox-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.92); display:none; align-items:center; justify-content:center; z-index:1000; }
.lightbox-overlay.open { display:flex; }
.lightbox-overlay img { max-width:90vw; max-height:90vh; }
.lightbox-close { position:absolute; top:24px; right:24px; font-size:1.6rem; color:var(--blanc-casse); cursor:pointer; }
.order-form { display:grid; gap:14px; margin-top:30px; }
.order-form input, .order-form textarea, .field-input { padding:13px 16px; background:var(--noir-soft); border:1px solid rgba(212,175,55,0.2); color:var(--blanc-casse); border-radius:var(--radius); font-family:inherit; width:100%; }

/* Admin */
.login-shell { max-width:400px; margin:120px auto; }
.admin-table { width:100%; border-collapse:collapse; margin-top:24px; }
.admin-table th, .admin-table td { padding:12px 14px; border-bottom:1px solid rgba(212,175,55,0.12); text-align:left; font-size:0.88rem; }
.admin-table th { color:var(--or); font-weight:500; text-transform:uppercase; font-size:0.72rem; letter-spacing:0.05em; }
.form-grid { display:grid; grid-template-columns:1fr 1fr; gap:16px; margin-top:24px; }
@media (max-width:700px) { .form-grid { grid-template-columns:1fr; } }
.form-grid label { font-size:0.78rem; color:var(--gris-texte); margin-bottom:6px; display:block; }
.full-row { grid-column:1/-1; }
.tab-buttons { display:flex; gap:10px; margin:30px 0 10px; }
.tab-buttons button { padding:10px 20px; border:1px solid rgba(212,175,55,0.3); border-radius:var(--radius); color:var(--gris-texte); }
.tab-buttons button.active { background:var(--gradient-or); color:var(--noir); }
.tab-panel { display:none; }
.tab-panel.active { display:block; }
.action-link { color:var(--or); cursor:pointer; margin-right:12px; font-size:0.82rem; }

.faq-item { border-bottom:1px solid rgba(212,175,55,0.15); padding:20px 0; }

.faq-item.open .faq-answer { display:block; }

.text-center { text-align:center; }
.mt-24 { margin-top:24px; }
</style>

<body>

<div id="app"></div>

<div class="lightbox-overlay" id="lightbox">
  <span class="lightbox-close" id="lightbox-close">✕</span>
  <img id="lightbox-img" src="" alt="">
</div>

<script>
/* ==========================================================================
   LA COLLECTION DORÉE — Application compilée (SPA)
   ========================================================================== */

/* ---------- CONFIGURATION ---------- */
const CONFIG = {
  API_URL: "https://script.google.com/macros/s/AKfycbyakOYRIl4OlsaAZ5pDLhSS0oTSgfuHwTqDfeh2YadiNJ9JOr0b7ydvckwrrpWSVJMAbQ/exec",
  WHATSAPP_NUMBER: "18297839254",
  CONTACT_EMAIL: "roseloreestimable86@gmail.com",
  SITE_NAME: "La Collection Dorée",
  CURRENCY: "USD", // à confirmer : HTG ou USD selon les prix réels
  CLOUDINARY_CLOUD_NAME: "brpyt6cw",
  CLOUDINARY_UPLOAD_PRESET: "collection_doree"
};

function formatPrice(value) {
  if (value === undefined || value === null || value === "") return "—";
  const num = Number(value);
  if (CONFIG.CURRENCY === "HTG") return num.toLocaleString("fr-HT") + " HTG";
  return num.toLocaleString("en-US", { style: "currency", currency: "USD" });
}

function buildWhatsappLink(produit, options = {}) {
  const quantite = options.quantite || 1;
  const lignes = [
    `Bonjour, je souhaite commander :`,
    `Produit : ${produit.Nom}`,
    `Référence : ${produit.Reference}`,
    `Prix : ${formatPrice(produit.Prix)}`,
    `Quantité : ${quantite}`,
    `Lien : ${window.location.origin}${window.location.pathname}#/produit?id=${produit.ID}`
  ];
  return `https://wa.me/${CONFIG.WHATSAPP_NUMBER}?text=${encodeURIComponent(lignes.join("\n"))}`;
}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str || '';
  return div.innerHTML;
}

/* ---------- API ---------- */
const API = {
  async get(params) {
    const url = new URL(CONFIG.API_URL);
    Object.keys(params).forEach(k => url.searchParams.set(k, params[k]));
    const res = await fetch(url.toString());
    return res.json();
  },
  async post(action, data, token) {
    console.log('[API.post] →', action, { data: (data && data.base64) ? { ...data, base64: `(${data.base64.length} caractères, tronqué)` } : data, tokenPresent: !!token });
    let res;
    try {
      res = await fetch(CONFIG.API_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
        body: JSON.stringify({ action, data, token })
      });
    } catch (networkErr) {
      console.error('[API.post] Erreur réseau (fetch a échoué) pour', action, networkErr);
      throw networkErr;
    }
    console.log('[API.post] ←', action, 'HTTP', res.status, res.statusText);
    const rawText = await res.text();
    console.log('[API.post] ← corps brut (', rawText.length, 'caractères ) :', rawText.slice(0, 2000));
    let json;
    try {
      json = JSON.parse(rawText);
    } catch (parseErr) {
      console.error('[API.post] Réponse non-JSON reçue pour', action, '— probablement une page HTML (redirection de connexion Google, erreur de déploiement GAS, etc.)', parseErr);
      throw new Error('Réponse serveur invalide (non-JSON). Voir console pour le détail.');
    }
    console.log('[API.post] JSON parsé pour', action, ':', json);
    return json;
  }
};

/* ---------- Stockage local (favoris, récents) ---------- */
const Favoris = {
  KEY: 'lcd_favoris',
  get() { return JSON.parse(localStorage.getItem(this.KEY) || '[]'); },
  toggle(id) { let l=this.get(); l=l.includes(id)?l.filter(x=>x!==id):[...l,id]; localStorage.setItem(this.KEY, JSON.stringify(l)); return l.includes(id); },
  has(id) { return this.get().includes(id); }
};
const RecentsVus = {
  KEY: 'lcd_recents',
  add(id) { let l=this.get().filter(x=>x!==id); l.unshift(id); localStorage.setItem(this.KEY, JSON.stringify(l.slice(0,8))); },
  get() { return JSON.parse(localStorage.getItem(this.KEY) || '[]'); }
};

/* ---------- Router (hash-based, compatible fichier unique) ---------- */
const Router = { routes: {}, add(path, handler) { this.routes[path] = handler; }, };

function parseHash() {
  const hash = window.location.hash.slice(1) || '/';
  const [path, queryString] = hash.split('?');
  const params = new URLSearchParams(queryString || '');
  return { path: path || '/', params };
}

window.addEventListener('hashchange', renderRoute);
window.addEventListener('DOMContentLoaded', renderRoute);

function navigate(path) { window.location.hash = path; }

function renderRoute() {
  const { path, params } = parseHash();
  const handler = Router.routes[path] || Router.routes['/'];
  document.getElementById('app').innerHTML = Layout(handler.title);
  bindLayoutEvents(path);
  handler.render(params);
  window.scrollTo(0, 0);
}

/* ---------- Layout commun (header / footer) ---------- */
function Layout(activePath) {
  const nav = [
    { path: '/', label: 'Accueil' },
    { path: '/collection', label: 'Collection' },
    { path: '/a-propos', label: 'À propos' },
    { path: '/contact', label: 'Contact' },
    { path: '/faq', label: 'FAQ' }
  ];
  return `
  <header class="site-header">
    <a href="#/" class="logo">Collection <span class="accent">D'Or</span></a>
    <ul class="nav-links" id="nav-links">
      ${nav.map(n => `<li><a href="#${n.path}" class="${activePath===n.path?'active':''}">${n.label}</a></li>`).join('')}
    </ul>
    <div class="header-actions">
      <a href="#/collection?favoris=1" class="btn-icon" aria-label="Favoris">♥</a>
      <button class="btn-icon mobile-toggle" id="mobile-toggle" aria-label="Menu">☰</button>
    </div>
  </header>
  <main id="view"></main>
  <footer class="site-footer">
    <div class="container">
      <div class="footer-grid">
        <div><h4>Collection D'Or</h4><p>L'élégance à chaque pas. Créations artisanales faites main en Haïti.</p></div>
        <div><h4>Navigation</h4><ul><li><a href="#/collection">Collection</a></li><li><a href="#/a-propos">À propos</a></li><li><a href="#/contact">Contact</a></li></ul></div>
        <div><h4>Informations</h4><ul><li><a href="#/faq">FAQ</a></li></ul></div>
        <div><h4>Contact</h4><ul><li><a href="https://wa.me/${CONFIG.WHATSAPP_NUMBER}" target="_blank">WhatsApp</a></li><li><a href="mailto:${CONFIG.CONTACT_EMAIL}">Email</a></li></ul></div>
      </div>
      <div class="footer-bottom">© ${new Date().getFullYear()} La Collection Dorée — Tous droits réservés.</div>
    </div>
  </footer>`;
}

function bindLayoutEvents(activePath) {
  const toggle = document.getElementById('mobile-toggle');
  const nav = document.getElementById('nav-links');
  if (toggle) toggle.addEventListener('click', () => nav.classList.toggle('open'));
}

/* ---------- Composants produit ---------- */
function renderProductCard(p) {
  const photo = (p.Photos && p.Photos[0]) || '';
  const enPromo = p.PrixPromo && Number(p.PrixPromo) > 0 && Number(p.PrixPromo) < Number(p.Prix);
  const isFav = Favoris.has(p.ID);
  return `
  <article class="product-card" data-id="${p.ID}">
    ${enPromo ? '<span class="badge">Promotion</span>' : ''}
    <button class="fav-btn" data-fav="${p.ID}" aria-label="Favoris">${isFav ? '★' : '☆'}</button>
    <div class="product-image-wrap" data-goto="${p.ID}">${photo ? `<img src="${photo}" alt="${escapeHtml(p.Nom)}" loading="lazy">` : ''}</div>
    <div class="product-info">
      <div class="product-category">${escapeHtml(p.Categorie || '')}</div>
      <h3 class="product-name" data-goto="${p.ID}">${escapeHtml(p.Nom)}</h3>
      <div class="product-price">
        <span class="current">${formatPrice(enPromo ? p.PrixPromo : p.Prix)}</span>
        ${enPromo ? `<span class="old">${formatPrice(p.Prix)}</span>` : ''}
      </div>
      <div class="product-actions">
        <button class="btn btn-outline" data-goto="${p.ID}">Voir</button>
        <button class="btn btn-primary" data-commander="${p.ID}">Commander</button>
        <button class="btn btn-outline" data-partager="${p.ID}" aria-label="Partager">⤴</button>
      </div>
    </div>
  </article>`;
}

function bindProductGridEvents(container, produitsById) {
  container.addEventListener('click', (e) => {
    const fav = e.target.closest('[data-fav]');
    if (fav) { const active = Favoris.toggle(fav.dataset.fav); fav.textContent = active ? '★' : '☆'; return; }
    const partager = e.target.closest('[data-partager]');
    if (partager) { sharerProduit(produitsById[partager.dataset.partager], partager.dataset.partager); return; }
    const commander = e.target.closest('[data-commander]');
    if (commander) {
      const produit = produitsById[commander.dataset.commander];
      if (produit) { API.post('clicWhatsapp', { id: produit.ID }).catch(()=>{}); window.open(buildWhatsappLink(produit), '_blank'); }
      return;
    }
    const goto = e.target.closest('[data-goto]');
    if (goto) navigate(`/produit?id=${goto.dataset.goto}`);
  });
}

function sharerProduit(produit, id) {
  const url = `${window.location.origin}${window.location.pathname}#/produit?id=${id}`;
  if (navigator.share && produit) navigator.share({ title: produit.Nom, text: `Découvrez ${produit.Nom} sur ${CONFIG.SITE_NAME}`, url });
  else { navigator.clipboard.writeText(url); alert('Lien copié dans le presse-papiers.'); }
}

function openLightbox(src) {
  document.getElementById('lightbox-img').src = src;
  document.getElementById('lightbox').classList.add('open');
}
document.addEventListener('DOMContentLoaded', () => {

  document.getElementById('lightbox').addEventListener('click', (e) => { if (e.target.id === 'lightbox') e.currentTarget.classList.remove('open'); });
});

              <div class="glass" style="padding:18px;border-radius:var(--radius)">
                <h4 style="color:var(--or);font-weight:500;margin-bottom:10px;font-size:0.85rem">Dernières commandes</h4>
                <div id="liste-commandes" style="font-size:0.82rem;color:var(--gris-texte)"></div>
              </div>
            </div>
          </div>
        </div>
        <div class="tab-panel" id="tab-produits">
          <table class="admin-table">
            <thead><tr><th>Photo</th><th>Nom</th><th>Catégorie</th><th>Prix</th><th>Stock</th><th>Statut</th><th>Actions</th></tr></thead>
            <tbody id="produits-tbody"></tbody>
          </table>
        </div>
        <div class="tab-panel" id="tab-ajouter">
          <h3 id="form-title">Nouveau produit</h3>
          <form id="produit-form" class="form-grid">
            <input type="hidden" name="id">
            <div><label>Nom du produit *</label><input type="text" name="nom" required class="field-input"></div>
            <div><label>Référence</label><input type="text" name="reference" placeholder="Générée automatiquement si vide" class="field-input"></div>
            <div><label>Prix *</label><input type="number" name="prix" step="0.01" required class="field-input"></div>
            <div><label>Prix promotionnel</label><input type="number" name="prixPromo" step="0.01" class="field-input"></div>
            <div><label>Catégorie *</label><input type="text" name="categorie" required placeholder="Ex: Sandales femme" class="field-input"></div>
            <div><label>Stock</label><input type="number" name="stock" value="1" class="field-input"></div>
            <div class="full-row"><label>Description</label><textarea name="description" rows="3" class="field-input"></textarea></div>
            <div class="full-row"><label>Caractéristiques</label><input type="text" name="caracteristiques" placeholder="Fait main, cuir véritable, ..." class="field-input"></div>
            <div class="full-row">
              <label>Photos du produit *</label>
              <input type="file" id="photo-input" accept="image/*" multiple style="display:none">
              <div id="upload-zone" style="border:2px dashed rgba(212,175,55,0.3);border-radius:var(--radius);padding:28px;text-align:center;cursor:pointer;transition:border-color var(--transition)" onclick="document.getElementById('photo-input').click()">
                <p style="color:var(--gris-texte);font-size:0.9rem">Clique ou glisse tes photos ici</p>
                <p style="color:var(--or);font-size:0.78rem;margin-top:6px">JPG, PNG, WEBP — plusieurs photos possibles</p>
              </div>
              <div id="photos-preview" style="display:flex;flex-wrap:wrap;gap:10px;margin-top:12px"></div>
              <div id="upload-progress" style="color:var(--or-clair);font-size:0.82rem;margin-top:8px"></div>
              <input type="hidden" name="photos" id="photos-hidden">
            </div>
            <div><label><input type="checkbox" name="disponible" checked style="width:auto;margin-right:8px">Disponible</label></div>
            <div><label><input type="checkbox" name="vedette" style="width:auto;margin-right:8px">Produit vedette</label></div>
            <div class="full-row">
              <button type="submit" class="btn btn-primary">Enregistrer le produit</button>
              <button type="button" id="cancel-edit" class="btn btn-outline" style="display:none;margin-left:10px">Annuler la modification</button>
            </div>
            <p id="form-feedback" class="full-row" style="color:var(--or-clair)"></p>
          </form>
        </div>
      </div>
    </div>`;

  function showAdmin() {
    document.getElementById('login-shell').style.display = 'none';
    document.getElementById('admin-shell').style.display = 'block';
    chargerProduitsAdmin();
    chargerDashboard();
  }
  if (adminToken) showAdmin();

  document.getElementById('login-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const password = document.getElementById('login-password').value;
    const res = await API.post('login', { password });
    if (res.token) { adminToken = res.token; localStorage.setItem('lcd_admin_token', adminToken); showAdmin(); }
    else document.getElementById('login-error').textContent = res.error || 'Erreur de connexion.';
  });

  document.getElementById('logout-btn').addEventListener('click', async () => {
    try { await API.post('logout', {}, adminToken); } catch (e) { /* ignore, on deconnecte quand meme cote client */ }
    adminToken = null;
    localStorage.removeItem('lcd_admin_token');
    renderRoute();
  });

  document.querySelectorAll('.tab-buttons button').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.tab-buttons button').forEach(b=>b.classList.remove('active'));
      document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));
      btn.classList.add('active');
      document.getElementById('tab-'+btn.dataset.tab).classList.add('active');
    });
  });

  async function chargerProduitsAdmin() {
    const tbody = document.getElementById('produits-tbody');
    tbody.innerHTML = '<tr><td colspan="7">Chargement...</td></tr>';
    const { produits, error } = await API.get({ action: 'produits' });
    if (error) { tbody.innerHTML = `<tr><td colspan="7">${error}</td></tr>`; return; }
    if (!produits.length) { tbody.innerHTML = '<tr><td colspan="7">Aucun produit. Ajoutez-en un dans l\u2019onglet "Ajouter un produit".</td></tr>'; return; }
    tbody.innerHTML = produits.map(p => `
      <tr>
        <td>${(p.Photos&&p.Photos[0])?`<img src="${p.Photos[0]}" style="width:46px;height:46px;object-fit:cover;border-radius:4px">`:''}</td>
        <td>${escapeHtml(p.Nom)}</td><td>${escapeHtml(p.Categorie||'')}</td><td>${formatPrice(p.Prix)}</td><td>${p.Stock}</td><td>${p.Disponible?'Disponible':'Masqué'}</td>
        <td><span class="action-link" data-edit="${p.ID}">Modifier</span><span class="action-link" data-delete="${p.ID}" style="color:#e0554f">Supprimer</span></td>
      </tr>`).join('');
    tbody.querySelectorAll('[data-edit]').forEach(el => el.addEventListener('click', () => editerProduit(produits.find(p=>p.ID===el.dataset.edit))));
    tbody.querySelectorAll('[data-delete]').forEach(el => el.addEventListener('click', () => supprimerProduit(el.dataset.delete)));
  }

  let chartJsLoadPromise = null;
  function loadChartJs() {
    if (window.Chart) return Promise.resolve();
    if (chartJsLoadPromise) return chartJsLoadPromise;
    chartJsLoadPromise = new Promise((resolve, reject) => {
      const script = document.createElement('script');
      script.src = 'https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.4/chart.umd.min.js';
      script.onload = resolve;
      script.onerror = () => reject(new Error('Impossible de charger Chart.js'));
      document.head.appendChild(script);
    });
    return chartJsLoadPromise;
  }

  let dashboardCharts = {};
  function detruireGraphique(id) {
    if (dashboardCharts[id]) { dashboardCharts[id].destroy(); delete dashboardCharts[id]; }
  }

  async function chargerDashboard() {
    const loadingEl = document.getElementById('dashboard-loading');
    const contentEl = document.getElementById('dashboard-content');
    loadingEl.style.display = 'block';
    loadingEl.textContent = 'Chargement des statistiques...';
    contentEl.style.display = 'none';
    try {
      await loadChartJs();
      const data = await API.get({ action: 'statistiques', token: adminToken });
      if (data.error) { loadingEl.textContent = data.error; return; }
      renderKpis(data.kpis);
      renderChartCommandes(data.commandesParJour);
      renderChartCategories(data.parCategorie);
      renderChartVues(data.plusConsultes);
      renderChartCommandesProduits(data.plusCommandes);
      renderListeRupture(data.produitsRuptureListe, data.produitsStockFaibleListe);
      renderListeMessages(data.messagesRecents);
      renderListeCommandes(data.dernieresCommandes);
      loadingEl.style.display = 'none';
      contentEl.style.display = 'block';
    } catch (err) {
      loadingEl.textContent = 'Erreur de chargement du dashboard : ' + err.message;
      console.error('[chargerDashboard]', err);
    }
  }

  function renderKpis(kpis) {
    const cartes = [
      { label: 'Produits', valeur: kpis.totalProduits },
      { label: 'Commandes', valeur: kpis.totalCommandes },
      { label: 'Chiffre d\u2019affaires', valeur: formatPrice(kpis.chiffreAffaires) },
      { label: 'Vues totales', valeur: kpis.totalVues },
      { label: 'Clics WhatsApp', valeur: kpis.totalClicsWhatsapp },
      { label: 'Messages non lus', valeur: kpis.messagesNonLus, alerte: kpis.messagesNonLus > 0 },
      { label: 'Ruptures de stock', valeur: kpis.produitsRupture, alerte: kpis.produitsRupture > 0 }
    ];
    document.getElementById('kpi-grid').innerHTML = cartes.map(c => `
      <div class="glass" style="padding:18px;border-radius:var(--radius);text-align:center">
        <div style="font-size:1.6rem;font-weight:500;color:${c.alerte ? '#e0554f' : 'var(--or)'}">${c.valeur}</div>
        <div style="font-size:0.75rem;color:var(--gris-texte);margin-top:4px;text-transform:uppercase;letter-spacing:0.04em">${c.label}</div>
      </div>`).join('');
  }

  function chartDefaults() {
    return {
      plugins: { legend: { labels: { color: '#B8B2A4', font: { size: 11 } } } },
      scales: {
        x: { ticks: { color: '#B8B2A4', font: { size: 10 } }, grid: { color: 'rgba(212,175,55,0.08)' } },
        y: { ticks: { color: '#B8B2A4', font: { size: 10 } }, grid: { color: 'rgba(212,175,55,0.08)' }, beginAtZero: true }
      }
    };
  }

  function renderChartCommandes(commandesParJour) {
    detruireGraphique('commandes');
    const ctx = document.getElementById('chart-commandes');
    dashboardCharts.commandes = new Chart(ctx, {
      type: 'line',
      data: {
        labels: commandesParJour.map(j => j.date),
        datasets: [{
          label: 'Commandes',
          data: commandesParJour.map(j => j.commandes),
          borderColor: '#D4AF37', backgroundColor: 'rgba(212,175,55,0.15)',
          fill: true, tension: 0.35, pointRadius: 3, pointBackgroundColor: '#E8C766'
        }]
      },
      options: Object.assign({ responsive: true }, chartDefaults())
    });
  }

  function renderChartCategories(parCategorie) {
    detruireGraphique('categories');
    const ctx = document.getElementById('chart-categories');
    const palette = ['#D4AF37', '#E8C766', '#B8862F', '#8C6A24', '#F0DFA8', '#6B4F16'];
    dashboardCharts.categories = new Chart(ctx, {
      type: 'doughnut',
      data: {
        labels: parCategorie.map(c => c.categorie),
        datasets: [{ data: parCategorie.map(c => c.count), backgroundColor: palette, borderColor: '#0B0B0B', borderWidth: 2 }]
      },
      options: { responsive: true, plugins: { legend: { position: 'bottom', labels: { color: '#B8B2A4', font: { size: 10 }, boxWidth: 12 } } } }
    });
  }

  function renderChartVues(plusConsultes) {
    detruireGraphique('vues');
    const ctx = document.getElementById('chart-vues');
    dashboardCharts.vues = new Chart(ctx, {
      type: 'bar',
      data: {
        labels: plusConsultes.map(p => p.nom),
        datasets: [{ label: 'Vues', data: plusConsultes.map(p => p.vues), backgroundColor: '#D4AF37', borderRadius: 4 }]
      },
      options: Object.assign({ responsive: true, indexAxis: 'y', plugins: { legend: { display: false } } }, chartDefaults())
    });
  }

  function renderChartCommandesProduits(plusCommandes) {
    detruireGraphique('commandesProduits');
    const ctx = document.getElementById('chart-commandes-produits');
    dashboardCharts.commandesProduits = new Chart(ctx, {
      type: 'bar',
      data: {
        labels: plusCommandes.map(p => p.nom),
        datasets: [{ label: 'Quantité commandée', data: plusCommandes.map(p => p.quantite), backgroundColor: '#E8C766', borderRadius: 4 }]
      },
      options: Object.assign({ responsive: true, indexAxis: 'y', plugins: { legend: { display: false } } }, chartDefaults())
    });
  }

  function renderListeRupture(rupture, faible) {
    const el = document.getElementById('liste-rupture');
    if (!rupture.length && !faible.length) { el.innerHTML = '<p style="color:var(--gris-texte)">Tout est en stock.</p>'; return; }
    el.innerHTML = [
      ...rupture.map(p => `<div style="padding:6px 0;border-bottom:1px solid rgba(212,175,55,0.08)"><strong style="color:#e0554f">Épuisé</strong> — ${escapeHtml(p.nom)}</div>`),
      ...faible.map(p => `<div style="padding:6px 0;border-bottom:1px solid rgba(212,175,55,0.08)"><strong style="color:var(--or-clair)">Stock faible (${p.stock})</strong> — ${escapeHtml(p.nom)}</div>`)
    ].join('');
  }

  function renderListeMessages(messages) {
    const el = document.getElementById('liste-messages');
    if (!messages.length) { el.innerHTML = '<p style="color:var(--gris-texte)">Aucun message.</p>'; return; }
    el.innerHTML = messages.map(m => `
      <div style="padding:6px 0;border-bottom:1px solid rgba(212,175,55,0.08)">
        ${!m.lu ? '<strong style="color:var(--or-clair)">● </strong>' : ''}${escapeHtml(m.nom || 'Anonyme')} — <span style="color:var(--gris-texte)">${escapeHtml(m.sujet || 'Sans sujet')}</span>
      </div>`).join('');
  }

  function renderListeCommandes(commandes) {
    const el = document.getElementById('liste-commandes');
    if (!commandes.length) { el.innerHTML = '<p style="color:var(--gris-texte)">Aucune commande.</p>'; return; }
    el.innerHTML = commandes.map(c => `
      <div style="padding:6px 0;border-bottom:1px solid rgba(212,175,55,0.08)">
        ${escapeHtml(c.nom || 'Client')} — ${escapeHtml(c.produit || '')} <span style="color:var(--or-clair)">${formatPrice(c.total)}</span>
      </div>`).join('');
  }

  function editerProduit(p) {
    const form = document.getElementById('produit-form');
    form.id.value = p.ID; form.nom.value = p.Nom; form.reference.value = p.Reference; form.prix.value = p.Prix;
    form.prixPromo.value = p.PrixPromo || ''; form.categorie.value = p.Categorie; form.stock.value = p.Stock;
    form.description.value = p.Description || ''; form.caracteristiques.value = p.Caracteristiques || '';
    form.photos.value = (p.Photos || []).join(', '); form.disponible.checked = !!p.Disponible; form.vedette.checked = !!p.Vedette;
    items = (p.Photos || []).map(url => ({ localSrc: url, status: 'done', url, error: null, name: '', file: null }));
    uploadedUrls = items.map(it => it.url);
    updateHidden(); refreshPreview();
    document.getElementById('form-title').textContent = 'Modifier le produit';
    document.getElementById('cancel-edit').style.display = 'inline-block';
    document.querySelector('[data-tab="ajouter"]').click();
  }

  document.getElementById('cancel-edit').addEventListener('click', () => {
    const form = document.getElementById('produit-form');
    form.reset(); form.id.value = '';
    document.getElementById('form-title').textContent = 'Nouveau produit';
    document.getElementById('cancel-edit').style.display = 'none';
  });

  async function supprimerProduit(id) {
    if (!confirm('Supprimer ce produit définitivement ?')) return;
    const res = await API.post('produitSupprimer', { id }, adminToken);
    if (res.success) chargerProduitsAdmin(); else alert(res.error || 'Erreur lors de la suppression.');
  }


  // ---- Logique upload photos ----
  const photoInput  = document.getElementById('photo-input');
  const uploadZone  = document.getElementById('upload-zone');
  const preview     = document.getElementById('photos-preview');
  const progress    = document.getElementById('upload-progress');
  const photosHidden = document.getElementById('photos-hidden');

  let uploadedUrls = [];   // URLs Drive confirmées (envoyées au serveur)
  let items = [];          // { localSrc, status:'uploading'|'done'|'error', url, error, name, file }

  function updateHidden() {
    photosHidden.value = uploadedUrls.join(',');
  }

  function refreshPreview() {
    preview.innerHTML = items.map((item, i) => {
      const src = item.status === 'done' ? item.url : item.localSrc;
      const overlay = item.status === 'uploading'
        ? `<div style="position:absolute;inset:0;background:rgba(0,0,0,0.5);display:flex;align-items:center;justify-content:center;border-radius:var(--radius);color:#fff;font-size:0.65rem">...</div>`
        : item.status === 'error'
        ? `<div style="position:absolute;inset:0;background:rgba(224,85,79,0.55);display:flex;align-items:center;justify-content:center;border-radius:var(--radius);color:#fff;font-size:1rem" title="${(item.error||'').replace(/"/g,'')}">⚠</div>`
        : '';
      const borderColor = item.status === 'error' ? '#e0554f' : 'rgba(212,175,55,0.3)';
      return `
      <div style="position:relative;width:80px;height:80px">
        <img src="${src}" style="width:80px;height:80px;object-fit:cover;border-radius:var(--radius);border:1px solid ${borderColor}">
        ${overlay}
        <button type="button" onclick="removePhoto(${i})" style="position:absolute;top:-6px;right:-6px;width:20px;height:20px;border-radius:50%;background:#e0554f;color:#fff;font-size:0.7rem;display:flex;align-items:center;justify-content:center;border:none;cursor:pointer">✕</button>
      </div>`;
    }).join('');
  }

  window.removePhoto = function(index) {
    items.splice(index, 1);
    uploadedUrls = items.filter(it => it.status === 'done').map(it => it.url);
    updateHidden();
    refreshPreview();
  };

  function readAsDataURL(file) {
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = (e) => resolve(e.target.result);
      reader.onerror = () => reject(new Error('Lecture du fichier impossible'));
      reader.readAsDataURL(file);
    });
  }

  async function uploadVersCloudinary(file) {
    const formData = new FormData();
    formData.append('file', file);
    formData.append('upload_preset', CONFIG.CLOUDINARY_UPLOAD_PRESET);
    const url = `https://api.cloudinary.com/v1_1/${CONFIG.CLOUDINARY_CLOUD_NAME}/image/upload`;
    const res = await fetch(url, { method: 'POST', body: formData });
    const json = await res.json();
    if (!res.ok || json.error) {
      throw new Error((json.error && json.error.message) || `Erreur HTTP ${res.status}`);
    }
    return json.secure_url;
  }

  async function traiterFichiers(files) {
    if (!files.length) return;
    uploadZone.style.borderColor = 'var(--or)';

    // 1) Aperçu local immédiat pour chaque fichier, AVANT tout upload
    const nouveaux = [];
    for (const file of Array.from(files)) {
      const dataUrl = await readAsDataURL(file);
      const item = { localSrc: dataUrl, status: 'uploading', url: null, error: null, name: file.name, file };
      items.push(item);
      nouveaux.push(item);
    }
    refreshPreview();

    // 2) Upload réel vers Cloudinary, mise à jour de l'aperçu au fur et à mesure
    let ok = 0, erreurs = 0;
    progress.style.color = 'var(--or-clair)';
    for (const item of nouveaux) {
      console.log('[traiterFichiers] Upload de', item.name, 'vers Cloudinary, mimeType:', item.file.type);
      try {
        const secureUrl = await uploadVersCloudinary(item.file);
        item.status = 'done';
        item.url = secureUrl;
        ok++;
        console.log('[traiterFichiers] OK pour', item.name, '→', secureUrl);
      } catch (err) {
        item.status = 'error';
        item.error = err.message || 'Erreur réseau';
        erreurs++;
        console.error('[traiterFichiers] EXCEPTION pour', item.name, ':', err);
      }
      uploadedUrls = items.filter(it => it.status === 'done').map(it => it.url);
      updateHidden();
      refreshPreview();
      progress.textContent = `${ok}/${nouveaux.length} photo(s) uploadée(s)` + (erreurs ? `, ${erreurs} erreur(s)` : '') + '...';
    }

    uploadZone.style.borderColor = erreurs ? '#e0554f' : 'rgba(212,175,55,0.3)';
    if (erreurs) {
      progress.style.color = '#e0554f';
      progress.textContent = `${ok} photo(s) prête(s), ${erreurs} échec(s). Survole ⚠ sur la vignette pour voir l'erreur.`;
    } else {
      progress.style.color = 'var(--or-clair)';
      progress.textContent = ok + ' photo(s) prête(s).';
    }
  }

  photoInput.addEventListener('change', (e) => { traiterFichiers(e.target.files); photoInput.value = ''; });

  // Drag & Drop
  uploadZone.addEventListener('dragover', (e) => { e.preventDefault(); uploadZone.style.borderColor='var(--or)'; });
  uploadZone.addEventListener('dragleave', () => { uploadZone.style.borderColor='rgba(212,175,55,0.3)'; });
  uploadZone.addEventListener('drop', (e) => { e.preventDefault(); traiterFichiers(e.dataTransfer.files); });

  // Réinitialise les photos lors de l'annulation de modification
  const origCancelEdit = document.getElementById('cancel-edit').onclick;
  document.getElementById('cancel-edit').addEventListener('click', () => {
    items = []; uploadedUrls = []; updateHidden(); refreshPreview(); progress.textContent = '';
  });

  document.getElementById('produit-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const form = e.target;
    const data = {
      id: form.id.value || undefined, nom: form.nom.value, reference: form.reference.value, prix: form.prix.value,
      prixPromo: form.prixPromo.value, categorie: form.categorie.value, stock: form.stock.value,
      description: form.description.value, caracteristiques: form.caracteristiques.value,
      photos: uploadedUrls.length ? uploadedUrls : form.photos.value.split(',').map(s=>s.trim()).filter(Boolean),
      disponible: form.disponible.checked, vedette: form.vedette.checked
    };
    const action = data.id ? 'produitModifier' : 'produitCreer';
    const res = await API.post(action, data, adminToken);
    const feedback = document.getElementById('form-feedback');
    if (res.success) {
      feedback.style.color = 'var(--or-clair)';
      feedback.textContent = 'Produit enregistré avec succès.';
      form.reset(); form.id.value = '';
      document.getElementById('form-title').textContent = 'Nouveau produit';
      document.getElementById('cancel-edit').style.display = 'none';
      chargerProduitsAdmin();
    } else {
      feedback.style.color = '#e0554f';
      feedback.textContent = res.error || "Erreur lors de l'enregistrement.";
    }
  });
}});
</script>
</body>
</html>
