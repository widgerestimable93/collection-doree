<style>
/* ==========================================================================
   LA COLLECTION DORÉE — Design system (compilé)
   ========================================================================== */
@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Jost:wght@300;400;500;600&display=swap');

:root {
  --noir: #0B0B0B;
  --noir-soft: #161513;
  --or: #D4AF37;
  --or-clair: #E8C766;
  --or-fonce: #9C7A22;
  --blanc-casse: #F5F1E8;
  --gris-texte: #B8B2A4;
  --gradient-or: linear-gradient(135deg, #9C7A22 0%, #D4AF37 45%, #F1D78C 60%, #D4AF37 100%);
  --font-display: 'Cormorant Garamond', serif;
  --font-body: 'Jost', sans-serif;
  --radius: 2px;
  --shadow-card: 0 20px 50px -20px rgba(0,0,0,0.6);
  --transition: 0.35s cubic-bezier(0.22,1,0.36,1);
  /* Jetons additionnels pour le thème (remplacent d'anciennes valeurs rgba() codées en dur) */
  --header-bg: rgba(11,11,11,0.78);
  --surface-glass: rgba(255,255,255,0.03);
  --overlay-badge: rgba(11,11,11,0.55);
  --skeleton-highlight: #221f1a;
}

/*
 * Thème clair — bascule via l'attribut data-theme="light" sur <html>.
 * Choix de couleurs : décision de conception (contraste lisible sur fond clair),
 * pas une valeur de marque fournie — l'or (--or/--or-clair/--or-fonce) reste identique
 * dans les deux thèmes, seuls les fonds/textes/surfaces changent.
 */
[data-theme="light"] {
  --noir: #F5F1E8;
  --noir-soft: #E8E1D0;
  --blanc-casse: #1A1712;
  --gris-texte: #6B6558;
  --header-bg: rgba(245,241,232,0.85);
  --surface-glass: rgba(11,11,11,0.035);
  --overlay-badge: rgba(245,241,232,0.7);
  --skeleton-highlight: #DCD3BC;
  --shadow-card: 0 20px 50px -20px rgba(11,11,11,0.18);
}

* { margin:0; padding:0; box-sizing:border-box; }
html { scroll-behavior: smooth; overflow-x: hidden; }
body { background: var(--noir); color: var(--blanc-casse); font-family: var(--font-body); font-weight:300; line-height:1.6; -webkit-font-smoothing:antialiased; transition: background-color var(--transition), color var(--transition); overflow-x: hidden; max-width: 100vw; }
a { color: inherit; text-decoration: none; }
img { max-width:100%; display:block; }
button { font-family: inherit; cursor:pointer; border:none; background:none; }
::selection { background: var(--or); color: var(--noir); }
:focus-visible { outline: 2px solid var(--or); outline-offset: 3px; }
@media (prefers-reduced-motion: reduce) { *,*::before,*::after { animation-duration:0.001ms !important; transition-duration:0.001ms !important; } }
.container { max-width:1280px; margin:0 auto; padding:0 24px; }
h1,h2,h3,h4 { font-family: var(--font-display); font-weight:500; letter-spacing:0.01em; }

.signature-divider { display:flex; align-items:center; justify-content:center; gap:12px; margin:24px 0; }
.signature-divider::before,.signature-divider::after { content:''; height:1px; width:60px; background:linear-gradient(90deg,transparent,var(--or)); }
.signature-divider::after { background:linear-gradient(90deg,var(--or),transparent); }
.signature-divider .diamond { width:7px; height:7px; background:var(--or); transform:rotate(45deg); }

.site-header { position:sticky; top:0; z-index:100; display:flex; align-items:center; justify-content:space-between; padding:18px 24px; background:var(--header-bg); backdrop-filter:blur(14px); border-bottom:1px solid rgba(212,175,55,0.18); }
.logo { font-family:var(--font-display); font-size:1.5rem; letter-spacing:0.08em; display:flex; align-items:baseline; gap:6px; }
.logo .accent { color:var(--or); font-style:italic; }
.nav-links { display:flex; gap:32px; list-style:none; font-size:0.85rem; letter-spacing:0.06em; text-transform:uppercase; }
.nav-links a { position:relative; padding-bottom:6px; transition:color var(--transition); }
.nav-links a::after { content:''; position:absolute; left:0; bottom:0; width:0; height:1px; background:var(--or); transition:width var(--transition); }
.nav-links a:hover::after, .nav-links a.active::after { width:100%; }
.nav-links a:hover, .nav-links a.active { color:var(--or-clair); }
.header-actions { display:flex; align-items:center; gap:18px; }
.btn-icon { width:38px; height:38px; display:flex; align-items:center; justify-content:center; border:1px solid rgba(212,175,55,0.3); border-radius:50%; transition:border-color var(--transition), background var(--transition); }
.btn-icon:hover { border-color:var(--or); background:rgba(212,175,55,0.08); }
.mobile-toggle { display:none; }
@media (max-width:860px) { .nav-links { display:none; } .mobile-toggle { display:flex; } .nav-links.open { display:flex; position:absolute; top:100%; left:0; right:0; flex-direction:column; background:var(--noir); padding:20px; gap:16px; border-bottom:1px solid rgba(212,175,55,0.18); } }

.btn { display:inline-flex; align-items:center; justify-content:center; gap:8px; padding:14px 32px; font-size:0.82rem; letter-spacing:0.08em; text-transform:uppercase; border-radius:var(--radius); transition:transform var(--transition), box-shadow var(--transition), background var(--transition); }
.btn-primary { background:var(--gradient-or); color:var(--noir); font-weight:500; }
.btn-primary:hover { transform:translateY(-2px); box-shadow:0 12px 30px -10px rgba(212,175,55,0.5); }

.hero { position:relative; min-height:78vh; display:flex; align-items:center; overflow:hidden; }
.hero::before { content:''; position:absolute; inset:0; background:radial-gradient(circle at 80% 20%, rgba(212,175,55,0.10), transparent 50%), radial-gradient(circle at 10% 80%, rgba(212,175,55,0.06), transparent 45%); pointer-events:none; }

.qty-control button { width:36px; height:36px; border:1px solid rgba(212,175,55,0.3); border-radius:50%; }

.order-form { display:grid; gap:14px; margin-top:30px; }
.order-form input, .order-form textarea, .field-input { padding:13px 16px; background:var(--noir-soft); border:1px solid rgba(212,175,55,0.2); color:var(--blanc-casse); border-radius:var(--radius); font-family:inherit; width:100%; }

/* Admin */

@media (max-width:480px) {

.admin-table { width:100%; border-collapse:collapse; margin-top:24px; }
.admin-table th, .admin-table td { padding:12px 14px; border-bottom:1px solid rgba(212,175,55,0.12); text-align:left; font-size:0.88rem; }

@media (max-width:700px) { .form-grid { grid-template-columns:1fr; } }
.form-grid label { font-size:0.78rem; color:var(--gris-texte); margin-bottom:6px; display:block; }

/* Tableaux admin/vendeur : le tableau défile horizontalement DANS son propre

/* Grilles à 2-3 colonnes (dashboard, aperçu) : repli automatique en 1 colonne sur mobile. */

<script>
/* ==========================================================================
   LA COLLECTION DORÉE — Application compilée (SPA)
   ========================================================================== */

/* ---------- CONFIGURATION ---------- */
const CONFIG = {
  API_URL: "https://script.google.com/macros/s/AKfycbyakOYRIl4OlsaAZ5pDLhSS0oTSgfuHwTqDfeh2YadiNJ9JOr0b7ydvckwrrpWSVJMAbQ/exec",
  WHATSAPP_NUMBER: "18297839254",
  CONTACT_EMAIL: "roseloreestimable86@gmail.com",
  SITE_NAME: "La Collection Dorée",
  CURRENCY: "USD", // à confirmer : HTG ou USD selon les prix réels
  CLOUDINARY_CLOUD_NAME: "brpyt6cw",
  CLOUDINARY_UPLOAD_PRESET: "collection_doree"
};

function formatPrice(value) {
  if (value === undefined || value === null || value === "") return "—";
  const num = Number(value);
  if (CONFIG.CURRENCY === "HTG") return num.toLocaleString("fr-HT") + " HTG";
  return num.toLocaleString("en-US", { style: "currency", currency: "USD" });
}

function buildWhatsappLink(produit, options = {}) {
  const quantite = options.quantite || 1;
  // Si le produit appartient à un vendeur (plateforme multi-boutiques), le message part
  // vers SON WhatsApp ; sinon on retombe sur le numéro global du site (anciens produits).
  const numero = (produit.Vendeur && produit.Vendeur.whatsapp) || CONFIG.WHATSAPP_NUMBER;
  const lignes = [
    `Bonjour, je souhaite commander :`,
    `Produit : ${produit.Nom}`,
    `Référence : ${produit.Reference}`,
    `Prix : ${formatPrice(produit.Prix)}`,
    `Quantité : ${quantite}`,
    `Lien : ${window.location.origin}${window.location.pathname}#/produit?id=${produit.ID}`
  ];
  return `https://wa.me/${numero}?text=${encodeURIComponent(lignes.join("\n"))}`;
}

function getProduitEmail(produit) {
  return (produit.Vendeur && produit.Vendeur.email) || CONFIG.CONTACT_EMAIL;
}

/** Affiche/masque l'aperçu d'une image téléversée (logo, bannière) — partagé
 *  entre /admin et /vendeur pour ne pas dupliquer cette logique. */
function afficherApercuImage(prefixe, url) {
  const img = document.getElementById(prefixe + '-preview');
  const label = document.getElementById(prefixe + '-label');
  if (!img || !label) return;
  if (url) { img.src = url; img.style.display = 'block'; label.textContent = 'Changer l\u2019image'; }
  else { img.style.display = 'none'; label.textContent = 'Clique pour choisir une image'; }
}

/** Bouton 👁 afficher/masquer un mot de passe — délégué sur tout le document
 *  pour fonctionner même sur les champs générés après un changement de route. */
document.addEventListener('click', (e) => {
  const btn = e.target.closest('[data-toggle-password]');
  if (!btn) return;
  const input = document.getElementById(btn.dataset.togglePassword);
  if (!input) return;
  const masque = input.type === 'password';
  input.type = masque ? 'text' : 'password';
  btn.textContent = masque ? '🙈' : '👁';
  btn.setAttribute('aria-label', masque ? 'Masquer le mot de passe' : 'Afficher le mot de passe');
});

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str || '';
  return div.innerHTML;
}

function cssVar(name) {
  return getComputedStyle(document.documentElement).getPropertyValue(name).trim();
}

/* ---------- API ---------- */
const API = {
  async get(params) {
    const url = new URL(CONFIG.API_URL);
    Object.keys(params).forEach(k => url.searchParams.set(k, params[k]));
    const res = await fetch(url.toString());
    return res.json();
  },
  async post(action, data, token) {
    console.log('[API.post] →', action, { data: (data && data.base64) ? { ...data, base64: `(${data.base64.length} caractères, tronqué)` } : data, tokenPresent: !!token });
    let res;
    try {
      res = await fetch(CONFIG.API_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
        body: JSON.stringify({ action, data, token })
      });
    } catch (networkErr) {
      console.error('[API.post] Erreur réseau (fetch a échoué) pour', action, networkErr);
      throw networkErr;
    }
    console.log('[API.post] ←', action, 'HTTP', res.status, res.statusText);
    const rawText = await res.text();
    console.log('[API.post] ← corps brut (', rawText.length, 'caractères ) :', rawText.slice(0, 2000));
    let json;
    try {
      json = JSON.parse(rawText);
    } catch (parseErr) {
      console.error('[API.post] Réponse non-JSON reçue pour', action, '— probablement une page HTML (redirection de connexion Google, erreur de déploiement GAS, etc.)', parseErr);
      throw new Error('Réponse serveur invalide (non-JSON). Voir console pour le détail.');
    }
    console.log('[API.post] JSON parsé pour', action, ':', json);
    return json;
  }
};

/* ---------- Stockage local (favoris, récents) ---------- */
const Favoris = {
  KEY: 'lcd_favoris',
  get() { return JSON.parse(localStorage.getItem(this.KEY) || '[]'); },
  toggle(id) { let l=this.get(); l=l.includes(id)?l.filter(x=>x!==id):[...l,id]; localStorage.setItem(this.KEY, JSON.stringify(l)); return l.includes(id); },
  has(id) { return this.get().includes(id); }
};
const RecentsVus = {
  KEY: 'lcd_recents',
  add(id) { let l=this.get().filter(x=>x!==id); l.unshift(id); localStorage.setItem(this.KEY, JSON.stringify(l.slice(0,8))); },
  get() { return JSON.parse(localStorage.getItem(this.KEY) || '[]'); }
};

/* ---------- Thème clair / sombre (public + admin, partagé via le layout commun) ---------- */
const Theme = {
  KEY: 'lcd_theme',
  get() { return localStorage.getItem(this.KEY) || 'dark'; },
  set(theme) {
    localStorage.setItem(this.KEY, theme);
    document.documentElement.setAttribute('data-theme', theme);
    document.querySelectorAll('[data-theme-toggle]').forEach(btn => {
      btn.textContent = theme === 'light' ? '🌙' : '☀️';
      btn.setAttribute('aria-label', theme === 'light' ? 'Passer au thème sombre' : 'Passer au thème clair');
    });
  },
  toggle() { this.set(this.get() === 'dark' ? 'light' : 'dark'); },
  init() { this.set(this.get()); } // resynchronise les boutons après chaque rendu de layout
};

/* ---------- Router (hash-based, compatible fichier unique) ---------- */
const Router = { routes: {}, add(path, handler) { this.routes[path] = handler; }, };

function parseHash() {
  const hash = window.location.hash.slice(1) || '/';
  const [path, queryString] = hash.split('?');
  const params = new URLSearchParams(queryString || '');
  return { path: path || '/', params };
}

window.addEventListener('hashchange', renderRoute);
window.addEventListener('DOMContentLoaded', renderRoute);
window.addEventListener('DOMContentLoaded', enregistrerVisiteSiPremiereFois);

/**
 * Enregistre UNE visite quand le visiteur ouvre le site (lien public GitHub Pages),
 * pas à chaque navigation interne. sessionStorage évite de recompter la même
 * personne qui navigue entre les pages dans le même onglet — mais si elle revient
 * plus tard ou dans un autre onglet, ce sera une nouvelle visite comptée (ce n'est
 * pas un compteur de visiteurs uniques garantis, voir limite expliquée à l'utilisateur).
 */
function enregistrerVisiteSiPremiereFois() {
  if (sessionStorage.getItem('lcd_visite_loggee')) return;
  sessionStorage.setItem('lcd_visite_loggee', '1');
  API.post('log', {
    type: 'Visite',
    route: window.location.hash || '#/',
    referrer: document.referrer || '',
    userAgent: navigator.userAgent
  }).catch(() => {}); // une visite non comptée ne doit jamais bloquer ou alerter le visiteur
}

function navigate(path) { window.location.hash = path; }

function renderRoute() {
  const { path, params } = parseHash();
  const handler = Router.routes[path] || Router.routes['/'];
  document.getElementById('app').innerHTML = Layout(handler.title);
  bindLayoutEvents(path);
  handler.render(params);
  window.scrollTo(0, 0);
}

/* ---------- Composants produit ---------- */
function renderProductCard(p) {
  const photo = (p.Photos && p.Photos[0]) || '';
  const enPromo = p.PrixPromo && Number(p.PrixPromo) > 0 && Number(p.PrixPromo) < Number(p.Prix);
  const isFav = Favoris.has(p.ID);
  return `
  <article class="product-card" data-id="${p.ID}">
    ${enPromo ? '<span class="badge">Promotion</span>' : ''}
    <button class="fav-btn" data-fav="${p.ID}" aria-label="Favoris">${isFav ? '★' : '☆'}</button>
    <div class="product-image-wrap" data-goto="${p.ID}">${photo ? `<img src="${photo}" alt="${escapeHtml(p.Nom)}" loading="lazy">` : ''}</div>
    <div class="product-info">
      <div class="product-category">${escapeHtml(p.Categorie || '')}</div>
      <h3 class="product-name" data-goto="${p.ID}">${escapeHtml(p.Nom)}</h3>
      <div class="product-price">
        <span class="current">${formatPrice(enPromo ? p.PrixPromo : p.Prix)}</span>
        ${enPromo ? `<span class="old">${formatPrice(p.Prix)}</span>` : ''}
      </div>
      <div class="product-actions">
        <button class="btn btn-outline" data-goto="${p.ID}">Voir</button>
        <button class="btn btn-primary" data-commander="${p.ID}">Commander</button>
        <button class="btn btn-outline" data-partager="${p.ID}" aria-label="Partager">⤴</button>
      </div>
    </div>
  </article>`;
}

function bindProductGridEvents(container, produitsById) {
  container.addEventListener('click', (e) => {
    const fav = e.target.closest('[data-fav]');
    if (fav) { const active = Favoris.toggle(fav.dataset.fav); fav.textContent = active ? '★' : '☆'; return; }
    const partager = e.target.closest('[data-partager]');
    if (partager) { sharerProduit(produitsById[partager.dataset.partager], partager.dataset.partager); return; }
    const commander = e.target.closest('[data-commander]');
    if (commander) {
      const produit = produitsById[commander.dataset.commander];
      if (produit) { API.post('clicWhatsapp', { id: produit.ID }).catch(()=>{}); window.open(buildWhatsappLink(produit), '_blank'); }
      return;
    }
    const goto = e.target.closest('[data-goto]');
    if (goto) navigate(`/produit?id=${goto.dataset.goto}`);
  });
}

function sharerProduit(produit, id) {
  const url = `${window.location.origin}${window.location.pathname}#/produit?id=${id}`;
  if (navigator.share && produit) navigator.share({ title: produit.Nom, text: `Découvrez ${produit.Nom} sur ${CONFIG.SITE_NAME}`, url });
  else { navigator.clipboard.writeText(url); alert('Lien copié dans le presse-papiers.'); }
}

function openLightbox(src) {
  document.getElementById('lightbox-img').src = src;
  document.getElementById('lightbox').classList.add('open');
}
document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('lightbox-close').addEventListener('click', () => document.getElementById('lightbox').classList.remove('open'));
  document.getElementById('lightbox').addEventListener('click', (e) => { if (e.target.id === 'lightbox') e.currentTarget.classList.remove('open'); });
});

  /* ---- Gestion des vendeurs (super-admin) ---- */
  async function chargerVendeurs() {
    const tbody = document.getElementById('vendeurs-tbody');
    tbody.innerHTML = '<tr><td colspan="7">Chargement...</td></tr>';
    const [{ vendeurs, error }, statsSA] = await Promise.all([
      API.get({ action: 'vendeurs', token: adminToken }),
      API.get({ action: 'statistiquesSuperAdmin', token: adminToken })
    ]);
    if (error) { tbody.innerHTML = `<tr><td colspan="7">${error}</td></tr>`; return; }

    if (!statsSA.error) {
      document.getElementById('vendeurs-kpi-grid').innerHTML = [
        { label: 'Vendeurs (total)', valeur: statsSA.totalVendeurs },
        { label: 'Actifs', valeur: statsSA.vendeursActifs },
        { label: 'Suspendus', valeur: statsSA.vendeursSuspendus, alerte: statsSA.vendeursSuspendus > 0 }
      ].map(k => `
        <div class="glass" style="padding:18px;border-radius:var(--radius);text-align:center">
          <div style="font-size:1.6rem;font-weight:500;color:${k.alerte?'#e0554f':'var(--or)'}">${k.valeur}</div>

        </div>`).join('');
    }

    if (!vendeurs.length) { tbody.innerHTML = '<tr><td colspan="7">Aucun vendeur pour le moment.</td></tr>'; return; }
    tbody.innerHTML = vendeurs.map(v => `
      <tr>
        <td>${escapeHtml(v.Boutique)}${v.Slug?` <a href="#/boutique?slug=${v.Slug}" target="_blank" style="color:var(--gris-texte);font-size:0.75rem">(voir)</a>`:''}</td>
        <td>${escapeHtml(v.Nom||'')}</td>
        <td>${escapeHtml(v.Email)}</td>
        <td>${escapeHtml(v.Plan||'gratuit')}</td>
        <td style="color:${v.Statut==='actif'?'var(--or-clair)':'#e0554f'}">${escapeHtml(v.Statut||'')}</td>
        <td>${v.DateCreation?new Date(v.DateCreation).toLocaleDateString('fr-FR'):''}</td>
        <td>
          <span class="action-link" data-edit-vendeur="${v.ID}">Modifier</span>
          <span class="action-link" data-toggle-statut="${v.ID}" data-statut-actuel="${v.Statut}">${v.Statut==='actif'?'Suspendre':'Réactiver'}</span>

      const script = document.createElement('script');
      script.src = 'https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.5.0/chart.umd.min.js';
      script.onload = resolve;
      script.onerror = () => reject(new Error('Impossible de charger Chart.js'));
      document.head.appendChild(script);

  }

  function readAsDataURL(file) {
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = (e) => resolve(e.target.result);
      reader.onerror = () => reject(new Error('Lecture du fichier impossible'));
      reader.readAsDataURL(file);
    });
  }

  async function uploadVersCloudinary(file) {
    const formData = new FormData();
    formData.append('file', file);
    formData.append('upload_preset', CONFIG.CLOUDINARY_UPLOAD_PRESET);
    const url = `https://api.cloudinary.com/v1_1/${CONFIG.CLOUDINARY_CLOUD_NAME}/image/upload`;
    const res = await fetch(url, { method: 'POST', body: formData });
    const json = await res.json();
    if (!res.ok || json.error) {
      throw new Error((json.error && json.error.message) || `Erreur HTTP ${res.status}`);
    }
    return json.secure_url;
  }

  async function traiterFichiers(files) {
    if (!files.length) return;
    uploadZone.style.borderColor = 'var(--or)';

    // 1) Aperçu local immédiat pour chaque fichier, AVANT tout upload
    const nouveaux = [];
    for (const file of Array.from(files)) {
      const dataUrl = await readAsDataURL(file);
      const item = { localSrc: dataUrl, status: 'uploading', url: null, error: null, name: file.name, file };
      items.push(item);
      nouveaux.push(item);
    }
    refreshPreview();

    // 2) Upload réel vers Cloudinary, mise à jour de l'aperçu au fur et à mesure
    let ok = 0, erreurs = 0;
    progress.style.color = 'var(--or-clair)';
    for (const item of nouveaux) {
      console.log('[traiterFichiers] Upload de', item.name, 'vers Cloudinary, mimeType:', item.file.type);
      try {
        const secureUrl = await uploadVersCloudinary(item.file);
        item.status = 'done';
        item.url = secureUrl;
        ok++;
        console.log('[traiterFichiers] OK pour', item.name, '→', secureUrl);
      } catch (err) {
        item.status = 'error';
        item.error = err.message || 'Erreur réseau';
        erreurs++;
        console.error('[traiterFichiers] EXCEPTION pour', item.name, ':', err);
      }
      uploadedUrls = items.filter(it => it.status === 'done').map(it => it.url);
      updateHidden();
      refreshPreview();
      progress.textContent = `${ok}/${nouveaux.length} photo(s) uploadée(s)` + (erreurs ? `, ${erreurs} erreur(s)` : '') + '...';
    }

    uploadZone.style.borderColor = erreurs ? '#e0554f' : 'rgba(212,175,55,0.3)';
    if (erreurs) {
      progress.style.color = '#e0554f';
      progress.textContent = `${ok} photo(s) prête(s), ${erreurs} échec(s). Survole ⚠ sur la vignette pour voir l'erreur.`;
    } else {
      progress.style.color = 'var(--or-clair)';
      progress.textContent = ok + ' photo(s) prête(s).';
    }
  }

  photoInput.addEventListener('change', (e) => { traiterFichiers(e.target.files); photoInput.value = ''; });

  // Drag & Drop
  uploadZone.addEventListener('dragover', (e) => { e.preventDefault(); uploadZone.style.borderColor='var(--or)'; });
  uploadZone.addEventListener('dragleave', () => { uploadZone.style.borderColor='rgba(212,175,55,0.3)'; });
  uploadZone.addEventListener('drop', (e) => { e.preventDefault(); traiterFichiers(e.dataTransfer.files); });

  // Réinitialise les photos lors de l'annulation de modification
  const origCancelEdit = document.getElementById('cancel-edit').onclick;
  document.getElementById('cancel-edit').addEventListener('click', () => {
    items = []; uploadedUrls = []; updateHidden(); refreshPreview(); progress.textContent = '';
    document.getElementById('ia-panel').style.display = 'none';
  });

  // ---- Assistant IA : génération automatique de la fiche produit ----
  const btnIaGenerer = document.getElementById('btn-ia-generer');
  const iaPanel      = document.getElementById('ia-panel');
  const iaStatus     = document.getElementById('ia-status');
  const iaResultat   = document.getElementById('ia-resultat');

  function escapeAttr(str) { return String(str || '').replace(/"/g, '&quot;'); }

  function afficherResultatIA(fiche) {
    const form = document.getElementById('produit-form');

    // Pré-remplit uniquement les champs vides ou après confirmation implicite du clic —
    // l'admin peut tout modifier avant d'enregistrer, rien n'est jamais sauvegardé automatiquement.
    if (fiche.nom) form.nom.value = fiche.nom;
    if (fiche.descriptionComplete) form.description.value = fiche.descriptionComplete;
    if (fiche.categorie) form.categorie.value = fiche.categorie;
    if (fiche.sousCategorie) form.sousCategorie.value = fiche.sousCategorie;
    if (fiche.style) form.style.value = fiche.style;
    if (fiche.couleurs) form.couleurs.value = fiche.couleurs;
    if (fiche.matiere) form.matiere.value = fiche.matiere;
    if (fiche.publicCible) form.publicCible.value = fiche.publicCible;
    if (fiche.tags) form.tags.value = fiche.tags;
    if (fiche.motsClesSEO) form.motsClesSEO.value = fiche.motsClesSEO;
    if (fiche.metaTitre) form.metaTitre.value = fiche.metaTitre;
    if (fiche.metaDescription) form.metaDescription.value = fiche.metaDescription;
    if (fiche.utilisation) {
      form.caracteristiques.value = (form.caracteristiques.value ? form.caracteristiques.value + ' — ' : '') + 'Utilisation : ' + fiche.utilisation;
    }

    // Le reste (hashtags, messages, publications, traductions, suggestions) est conservé
    // tel quel en JSON pour être sauvegardé avec le produit, et affiché ci-dessous pour copie manuelle.
    const donneesMarketing = {
      descriptionCourte: fiche.descriptionCourte || '',
      hashtagsInstagram: fiche.hashtagsInstagram || '',
      hashtagsFacebook: fiche.hashtagsFacebook || '',
      messageWhatsapp: fiche.messageWhatsapp || '',
      publicationFacebook: fiche.publicationFacebook || '',
      publicationInstagram: fiche.publicationInstagram || '',
      ideesVenteCroisee: fiche.ideesVenteCroisee || '',
      traductions: fiche.traductions || {},
      niveauConfiance: fiche.niveauConfiance || '',
      elementsAVerifier: fiche.elementsAVerifier || []
    };
    document.getElementById('donnees-marketing-ia').value = JSON.stringify(donneesMarketing);

    const alerteConfiance = fiche.niveauConfiance === 'basse'
      ? `<p style="color:#e0554f;margin-bottom:8px">⚠ Confiance basse : relis attentivement chaque champ avant d'enregistrer.</p>` : '';

    const suggestionPrix = fiche.suggestionPrix && fiche.suggestionPrix.prixCoherent === false
      ? `<p style="color:var(--or);margin-bottom:8px">💡 Prix potentiellement incohérent — suggestion (estimation, pas une certitude) :
          ${fiche.suggestionPrix.prixSuggere != null ? formatPrice(fiche.suggestionPrix.prixSuggere) : 'non déterminée'}.
          ${escapeHtml(fiche.suggestionPrix.justification || '')}</p>`
      : '';

    const aVerifier = (fiche.elementsAVerifier || []).length
      ? `<p style="margin-bottom:8px"><strong>À vérifier :</strong> ${fiche.elementsAVerifier.map(escapeHtml).join(', ')}</p>` : '';

    iaResultat.innerHTML = `
      ${alerteConfiance}${suggestionPrix}${aVerifier}
      <p style="margin-bottom:8px">Formulaire pré-rempli — relis et corrige les champs ci-dessus avant d'enregistrer.</p>
      <details><summary style="cursor:pointer;color:var(--or)">Voir hashtags, messages &amp; traductions générés</summary>
        <div style="margin-top:10px;display:grid;gap:8px">
          <div><strong>Description courte :</strong> ${escapeHtml(fiche.descriptionCourte || '—')}</div>
          <div><strong>Hashtags Instagram :</strong> ${escapeHtml(fiche.hashtagsInstagram || '—')}</div>
          <div><strong>Hashtags Facebook :</strong> ${escapeHtml(fiche.hashtagsFacebook || '—')}</div>
          <div><strong>Message WhatsApp :</strong> ${escapeHtml(fiche.messageWhatsapp || '—')}</div>
          <div><strong>Publication Facebook :</strong> ${escapeHtml(fiche.publicationFacebook || '—')}</div>
          <div><strong>Publication Instagram :</strong> ${escapeHtml(fiche.publicationInstagram || '—')}</div>
          <div><strong>Idées de vente croisée :</strong> ${escapeHtml(fiche.ideesVenteCroisee || '—')}</div>
          <div><strong>EN :</strong> ${escapeHtml((fiche.traductions && fiche.traductions.en && fiche.traductions.en.nom) || '—')}</div>
          <div><strong>ES :</strong> ${escapeHtml((fiche.traductions && fiche.traductions.es && fiche.traductions.es.nom) || '—')}</div>
          <div><strong>Kreyòl :</strong> ${escapeHtml((fiche.traductions && fiche.traductions.ht && fiche.traductions.ht.nom) || '—')}</div>
        </div>
      </details>`;
  }

  btnIaGenerer.addEventListener('click', async () => {
    if (!uploadedUrls.length) {
      iaPanel.style.display = 'block';
      iaStatus.textContent = "Ajoute au moins une photo avant de lancer l'analyse IA.";
      iaStatus.style.color = '#e0554f';
      document.getElementById('ia-progress-bar').style.display = 'none';
      iaResultat.innerHTML = '';
      return;
    }

    const form = document.getElementById('produit-form');
    iaPanel.style.display = 'block';
    iaStatus.style.color = 'var(--gris-texte)';
    iaStatus.textContent = 'Analyse en cours...';
    document.getElementById('ia-progress-bar').style.display = 'block';
    iaResultat.innerHTML = '';
    btnIaGenerer.disabled = true;
    btnIaGenerer.style.opacity = '0.6';

    try {
      const res = await API.post('genererFicheIA', {
        photos: uploadedUrls, prix: form.prix.value, stock: form.stock.value
      }, adminToken);

      if (res.error) {
        iaStatus.style.color = '#e0554f';
        iaStatus.textContent = res.error;
        document.getElementById('ia-progress-bar').style.display = 'none';
      } else if (res.success && res.fiche) {
        iaStatus.style.color = 'var(--or-clair)';
        iaStatus.textContent = 'Analyse terminée.';
        document.getElementById('ia-progress-bar').style.display = 'none';
        afficherResultatIA(res.fiche);
      } else {
        iaStatus.style.color = '#e0554f';
        iaStatus.textContent = "Réponse inattendue de l'IA.";
        document.getElementById('ia-progress-bar').style.display = 'none';
      }
    } catch (err) {
      iaStatus.style.color = '#e0554f';
      iaStatus.textContent = "Erreur réseau pendant l'analyse : " + err.message;
      document.getElementById('ia-progress-bar').style.display = 'none';
    } finally {
      btnIaGenerer.disabled = false;
      btnIaGenerer.style.opacity = '1';
    }
  });

  document.getElementById('produit-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const form = e.target;
    const data = {
      id: form.id.value || undefined, nom: form.nom.value, reference: form.reference.value, prix: form.prix.value,
      prixPromo: form.prixPromo.value, categorie: form.categorie.value, stock: form.stock.value,
      description: form.description.value, caracteristiques: form.caracteristiques.value,
      photos: uploadedUrls.length ? uploadedUrls : form.photos.value.split(',').map(s=>s.trim()).filter(Boolean),
      disponible: form.disponible.checked, vedette: form.vedette.checked,
      sousCategorie: form.sousCategorie.value, style: form.style.value, couleurs: form.couleurs.value,
      matiere: form.matiere.value, publicCible: form.publicCible.value, tags: form.tags.value,
      motsClesSEO: form.motsClesSEO.value, metaTitre: form.metaTitre.value, metaDescription: form.metaDescription.value,
      donneesMarketingIA: form.donneesMarketingIA.value
    };
    const action = data.id ? 'produitModifier' : 'produitCreer';
    const res = await API.post(action, data, adminToken);
    const feedback = document.getElementById('form-feedback');
    if (res.success) {
      feedback.style.color = 'var(--or-clair)';
      feedback.textContent = 'Produit enregistré avec succès.';
      form.reset(); form.id.value = '';
      document.getElementById('form-title').textContent = 'Nouveau produit';
      document.getElementById('cancel-edit').style.display = 'none';
      document.getElementById('ia-panel').style.display = 'none';
      items = []; uploadedUrls = []; updateHidden(); refreshPreview();
      chargerProduitsAdmin();
    } else {
      feedback.style.color = '#e0554f';
      feedback.textContent = res.error || "Erreur lors de l'enregistrement.";
    }
  });
}});

  /**
   * Si une réponse API indique que la session vendeur n'est plus valide (compte
   * suspendu, supprimé, ou token expiré), on arrête tout et on affiche un message
   * clair à la place du tableau de bord — plutôt qu'une simple ligne d'erreur
   * perdue dans un panneau. Retourne true si c'était bien ce cas (pour que
   * l'appelant arrête son propre rendu).
   */
  let compteBloqueAffiche = false;
  function gererSessionInvalide(erreur) {
    if (!erreur) return false;
    const estProblemeSession = /suspendu|n'existe plus|session invalide/i.test(erreur);
    if (!estProblemeSession) return false;

    if (!compteBloqueAffiche) {
      compteBloqueAffiche = true;
      localStorage.removeItem('lcd_vendeur_token');
      localStorage.removeItem('lcd_vendeur_info');
      document.getElementById('vendeur-shell').innerHTML = `
        <div class="glass" style="padding:40px;text-align:center;max-width:500px;margin:60px auto">
          <h2 style="color:#e0554f;margin-bottom:14px">Accès suspendu</h2>
          <p style="color:var(--gris-texte);margin-bottom:20px">${escapeHtml(erreur)}</p>
          <p style="color:var(--gris-texte);font-size:0.85rem;margin-bottom:24px">
            Si tu penses qu'il s'agit d'une erreur, contacte l'administrateur de la plateforme.
          </p>
          <button class="btn btn-primary" onclick="location.hash='#/vendeur'; location.reload()">Retour à la connexion</button>
        </div>`;
    }
    return true;
  }

  async function chargerApercuVendeur() {
    const { produits, error: errP } = await API.get({ action: 'produits', vendeurId: vendeurInfo.id });
    const { commandes, error: errC } = await API.get({ action: 'commandes', token: vendeurToken });
    if (gererSessionInvalide(errP) || gererSessionInvalide(errC)) return;
    const grid = document.getElementById('v-kpi-grid');
    if (errP || errC) { grid.innerHTML = `<p style="color:#e0554f">${escapeHtml(errP || errC)}</p>`; return; }
    const ruptures = produits.filter(p => Number(p.Stock) <= 0);
    const aujourdHui = new Date().toDateString();
    const commandesJour = commandes.filter(c => new Date(c.Date).toDateString() === aujourdHui);
    const kpis = [
      { label: 'Produits', valeur: produits.length },
      { label: 'En rupture', valeur: ruptures.length },
      { label: 'Commandes (total)', valeur: commandes.length },
      { label: "Commandes aujourd'hui", valeur: commandesJour.length }
    ];
    grid.innerHTML = kpis.map(k => `
      <div class="glass" style="padding:18px;border-radius:var(--radius);text-align:center">
        <div style="font-size:1.8rem;color:var(--or);font-family:var(--font-display)">${k.valeur}</div>
        <div style="color:var(--gris-texte);font-size:0.8rem;margin-top:4px">${k.label}</div>
      </div>`).join('');
    document.getElementById('v-liste-rupture').innerHTML = ruptures.length
      ? ruptures.map(p => `<div style="padding:6px 0;border-bottom:1px solid rgba(212,175,55,0.08)">${escapeHtml(p.Nom)}</div>`).join('')
      : 'Aucun produit en rupture.';
    document.getElementById('v-liste-commandes').innerHTML = commandes.slice(0,5).length
      ? commandes.slice(0,5).map(c => `<div style="padding:6px 0;border-bottom:1px solid rgba(212,175,55,0.08)">${escapeHtml(c.NomClient)} — ${escapeHtml(c.ProduitNom)} ×${c.Quantite}</div>`).join('')
      : 'Aucune commande pour le moment.';
  }

  async function chargerProduitsVendeur() {
    const tbody = document.getElementById('v-produits-tbody');
    if (!tbody) return; // le panneau a pu être remplacé par le message "Accès suspendu"
    tbody.innerHTML = '<tr><td colspan="7">Chargement...</td></tr>';
    const { produits, error } = await API.get({ action: 'produits', vendeurId: vendeurInfo.id });
    if (gererSessionInvalide(error)) return;
    if (error) { tbody.innerHTML = `<tr><td colspan="7">${escapeHtml(error)}</td></tr>`; return; }
    if (!produits.length) { tbody.innerHTML = '<tr><td colspan="7">Aucun produit. Ajoutez-en un dans l\u2019onglet "Ajouter un produit".</td></tr>'; return; }
    tbody.innerHTML = produits.map(p => `
      <tr>
        <td>${(p.Photos&&p.Photos[0])?`<img src="${p.Photos[0]}" style="width:46px;height:46px;object-fit:cover;border-radius:4px">`:''}</td>
        <td>${escapeHtml(p.Nom)}</td><td>${escapeHtml(p.Categorie||'')}</td><td>${formatPrice(p.Prix)}</td><td>${p.Stock}</td><td>${p.Disponible?'Disponible':'Masqué'}</td>
        <td><span class="action-link" data-edit="${p.ID}">Modifier</span><span class="action-link" data-delete="${p.ID}" style="color:#e0554f">Supprimer</span></td>
      </tr>`).join('');
    tbody.querySelectorAll('[data-edit]').forEach(el => el.addEventListener('click', () => editerProduitVendeur(produits.find(p=>p.ID===el.dataset.edit))));
    tbody.querySelectorAll('[data-delete]').forEach(el => el.addEventListener('click', () => supprimerProduitVendeur(el.dataset.delete)));
  }

  /* ---- Upload photos + IA (identique en logique à /admin, scopé au token vendeur) ---- */
  let items = [], uploadedUrls = [];
  const photoInput = document.getElementById('v-photo-input');

  const preview = document.getElementById('v-photos-preview');

  function updateHidden() { document.getElementById('v-photos-hidden').value = uploadedUrls.join(','); }
  function refreshPreview() {
    preview.innerHTML = items.map((it,i) => `
      <div style="position:relative;width:70px;height:70px">
        <img src="${it.localSrc}" style="width:100%;height:100%;object-fit:cover;border-radius:4px;${it.status!=='done'?'opacity:0.5':''}">
        ${it.status==='uploading'?'<div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,0.5);color:#fff;font-size:0.7rem">...</div>':''}
        ${it.status==='error'?'<div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(224,85,79,0.7);color:#fff;font-size:1rem">!</div>':''}
        <button type="button" data-remove="${i}" style="position:absolute;top:-6px;right:-6px;width:18px;height:18px;border-radius:50%;background:#e0554f;color:#fff;font-size:0.7rem;line-height:1">×</button>
      </div>`).join('');
    preview.querySelectorAll('[data-remove]').forEach(btn => btn.addEventListener('click', () => {
      const i = Number(btn.dataset.remove);
      items.splice(i,1); uploadedUrls = items.filter(it=>it.status==='done').map(it=>it.url);
      updateHidden(); refreshPreview();
    }));
  }

  async function uploaderFichier(file) {
    const formData = new FormData();
    formData.append('file', file);
    formData.append('upload_preset', CONFIG.CLOUDINARY_UPLOAD_PRESET);
    const res = await fetch(`https://api.cloudinary.com/v1_1/${CONFIG.CLOUDINARY_CLOUD_NAME}/image/upload`, { method:'POST', body: formData });
    if (!res.ok) throw new Error('Échec upload');
    const data = await res.json();
    return data.secure_url;
  }

  async function gererFichiers(fileList) {
    const nouveaux = Array.from(fileList).map(file => ({ localSrc: URL.createObjectURL(file), status:'uploading', url:null, error:null, name:file.name, file }));
    items.push(...nouveaux); refreshPreview();
    for (const it of nouveaux) {
      try { it.url = await uploaderFichier(it.file); it.status = 'done'; }
      catch (e) { it.status = 'error'; it.error = e.message; }
      uploadedUrls = items.filter(x=>x.status==='done').map(x=>x.url);
      updateHidden(); refreshPreview();
    }
  }

  photoInput.addEventListener('change', (e) => gererFichiers(e.target.files));

  function afficherResultatIAVendeur(fiche) {
    const form = document.getElementById('v-produit-form');
    if (fiche.nom) form.nom.value = fiche.nom;
    if (fiche.descriptionComplete) form.description.value = fiche.descriptionComplete;
    if (fiche.categorie) form.categorie.value = fiche.categorie;
    if (fiche.sousCategorie) form.sousCategorie.value = fiche.sousCategorie;
    if (fiche.style) form.style.value = fiche.style;
    if (fiche.couleurs) form.couleurs.value = fiche.couleurs;
    if (fiche.matiere) form.matiere.value = fiche.matiere;
    if (fiche.publicCible) form.publicCible.value = fiche.publicCible;
    if (fiche.tags) form.tags.value = fiche.tags;
    if (fiche.motsClesSEO) form.motsClesSEO.value = fiche.motsClesSEO;
    if (fiche.metaTitre) form.metaTitre.value = fiche.metaTitre;
    if (fiche.metaDescription) form.metaDescription.value = fiche.metaDescription;
    if (fiche.utilisation) form.caracteristiques.value = (form.caracteristiques.value?form.caracteristiques.value+' — ':'') + 'Utilisation : ' + fiche.utilisation;

    document.getElementById('v-donnees-marketing-ia').value = JSON.stringify({
      descriptionCourte: fiche.descriptionCourte || '', hashtagsInstagram: fiche.hashtagsInstagram || '',
      hashtagsFacebook: fiche.hashtagsFacebook || '', messageWhatsapp: fiche.messageWhatsapp || '',
      publicationFacebook: fiche.publicationFacebook || '', publicationInstagram: fiche.publicationInstagram || '',
      ideesVenteCroisee: fiche.ideesVenteCroisee || '', traductions: fiche.traductions || {},
      niveauConfiance: fiche.niveauConfiance || '', elementsAVerifier: fiche.elementsAVerifier || []
    });

    const alerte = fiche.niveauConfiance === 'basse' ? `<p style="color:#e0554f;margin-bottom:8px">⚠ Confiance basse : relis chaque champ.</p>` : '';
    const aVerifier = (fiche.elementsAVerifier||[]).length ? `<p><strong>À vérifier :</strong> ${fiche.elementsAVerifier.map(escapeHtml).join(', ')}</p>` : '';
    iaResultat.innerHTML = `${alerte}<p style="margin-bottom:8px">Formulaire pré-rempli — relis avant d'enregistrer.</p>${aVerifier}`;
  }

  btnIaGenerer.addEventListener('click', async () => {
    if (!uploadedUrls.length) {
      iaPanel.style.display = 'block'; iaStatus.style.color = '#e0554f';
      iaStatus.textContent = "Ajoute au moins une photo avant de lancer l'analyse IA.";
      document.getElementById('v-ia-progress-bar').style.display = 'none'; iaResultat.innerHTML = '';
      return;
    }
    const form = document.getElementById('v-produit-form');
    iaPanel.style.display = 'block'; iaStatus.style.color = 'var(--gris-texte)'; iaStatus.textContent = 'Analyse en cours...';
    document.getElementById('v-ia-progress-bar').style.display = 'block'; iaResultat.innerHTML = '';
    btnIaGenerer.disabled = true; btnIaGenerer.style.opacity = '0.6';
    try {
      const res = await API.post('genererFicheIA', { photos: uploadedUrls, prix: form.prix.value, stock: form.stock.value }, vendeurToken);
      if (res.error) {
        iaStatus.style.color = '#e0554f'; iaStatus.textContent = res.error;
        document.getElementById('v-ia-progress-bar').style.display = 'none';
      } else if (res.success && res.fiche) {
        iaStatus.style.color = 'var(--or-clair)'; iaStatus.textContent = 'Analyse terminée.';
        document.getElementById('v-ia-progress-bar').style.display = 'none';
        afficherResultatIAVendeur(res.fiche);
      }
    } catch (err) {
      iaStatus.style.color = '#e0554f'; iaStatus.textContent = "Erreur réseau : " + err.message;
      document.getElementById('v-ia-progress-bar').style.display = 'none';
    } finally {
      btnIaGenerer.disabled = false; btnIaGenerer.style.opacity = '1';
    }
  });

  document.getElementById('v-produit-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const form = e.target;
    const data = {
      id: form.id.value || undefined, nom: form.nom.value, reference: form.reference.value,
      prix: form.prix.value, prixPromo: form.prixPromo.value, categorie: form.categorie.value,
      stock: form.stock.value, description: form.description.value, caracteristiques: form.caracteristiques.value,
      photos: uploadedUrls.length ? uploadedUrls : form.photos.value.split(',').map(s=>s.trim()).filter(Boolean),
      disponible: form.disponible.checked, vedette: form.vedette.checked,
      sousCategorie: form.sousCategorie.value, style: form.style.value, couleurs: form.couleurs.value,
      matiere: form.matiere.value, publicCible: form.publicCible.value, tags: form.tags.value,
      motsClesSEO: form.motsClesSEO.value, metaTitre: form.metaTitre.value, metaDescription: form.metaDescription.value,
      donneesMarketingIA: form.donneesMarketingIA.value
    };
    const action = data.id ? 'produitModifier' : 'produitCreer';
    const res = await API.post(action, data, vendeurToken);
    const feedback = document.getElementById('v-form-feedback');
    if (res.success) {
      feedback.style.color = 'var(--or-clair)'; feedback.textContent = 'Produit enregistré avec succès.';
      form.reset(); form.id.value = '';
      document.getElementById('v-form-title').textContent = 'Nouveau produit';
      document.getElementById('v-cancel-edit').style.display = 'none';
      document.getElementById('v-ia-panel').style.display = 'none';
      items = []; uploadedUrls = []; updateHidden(); refreshPreview();
      chargerProduitsVendeur(); chargerApercuVendeur();
    } else {
      feedback.style.color = '#e0554f'; feedback.textContent = res.error || "Erreur lors de l'enregistrement.";
    }
  });
}});

/* ----- Boutique publique (/boutique?slug=...) ----- */
Router.add('/boutique', { title: '/boutique', render: async (params) => {
  const slug = params.get('slug');
  const view = document.getElementById('view');
  view.innerHTML = `<div class="container" style="padding:40px 0"><div class="skeleton" style="height:200px;margin-bottom:20px"></div><div id="boutique-produits" class="products-grid"></div></div>`;
  if (!slug) { view.innerHTML = '<div class="container"><p class="empty-state">Boutique non spécifiée.</p></div>'; return; }

  try {
    const { vendeur, error } = await API.get({ action: 'vendeurPublic', slug });
    if (error || !vendeur) throw new Error(error || 'introuvable');
    document.getElementById('page-title').textContent = `${vendeur.Boutique} — La Collection Dorée`;

    const { produits } = await API.get({ action: 'produits', vendeurId: vendeur.ID });
    const byId = {}; (produits||[]).forEach(p => byId[p.ID] = p);

    view.innerHTML = `
      <div style="background:${vendeur.Banniere?`url(${vendeur.Banniere}) center/cover`:'var(--noir-soft)'};height:220px;display:flex;align-items:flex-end">
        <div class="container" style="display:flex;align-items:center;gap:16px;padding-bottom:20px;flex-wrap:wrap">
          ${vendeur.Logo?`<img src="${vendeur.Logo}" style="width:70px;height:70px;border-radius:50%;object-fit:cover;border:2px solid var(--or)">`:''}
          <div>
            <h1 style="font-size:1.8rem">${escapeHtml(vendeur.Boutique)}</h1>
            <p style="color:var(--gris-texte);font-size:0.9rem">${escapeHtml(vendeur.Adresse||'')}</p>
          </div>
        </div>
      </div>
      <div class="container" style="padding:30px 0">
        ${vendeur.Description?`<p style="color:var(--gris-texte);margin-bottom:20px;max-width:700px">${escapeHtml(vendeur.Description)}</p>`:''}
        <div style="display:flex;gap:12px;margin-bottom:30px">
          ${vendeur.Whatsapp?`<a href="https://wa.me/${vendeur.Whatsapp}" target="_blank" class="btn btn-whatsapp">WhatsApp</a>`:''}
          ${vendeur.Email?`<a href="mailto:${vendeur.Email}" class="btn btn-outline">Email</a>`:''}
        </div>
        <div id="boutique-produits" class="products-grid">
          ${(produits&&produits.length) ? produits.map(renderProductCard).join('') : '<p class="empty-state">Aucun produit publié pour le moment.</p>'}
        </div>
      </div>`;
    const grid = document.getElementById('boutique-produits');
    if (grid) bindProductGridEvents(grid, byId);
  } catch (e) {
    view.innerHTML = '<div class="container"><p class="empty-state">Boutique introuvable ou indisponible.</p></div>';
  }
}});

/* ----- Devenir vendeur (page publique) ----- */
Router.add('/devenir-vendeur', { title: '/devenir-vendeur', render: () => {
  document.getElementById('view').innerHTML = `
    <div class="container" style="padding:50px 0;max-width:640px">
      <h1 style="margin-bottom:10px">Devenir vendeur sur La Collection Dorée</h1>
      <p style="color:var(--gris-texte);margin-bottom:30px">
        Remplis ce formulaire pour demander l'ouverture de ta propre boutique sur la plateforme.
        Un membre de l'équipe examine chaque demande avant de créer ton accès.
      </p>
      <form id="devenir-vendeur-form" class="form-grid glass" style="padding:24px">
        <div><label>Ton nom complet *</label><input type="text" name="nom" required class="field-input"></div>
        <div><label>Nom de ta boutique *</label><input type="text" name="boutique" required class="field-input"></div>
        <div><label>Email *</label><input type="email" name="email" required class="field-input"></div>
        <div><label>Téléphone</label><input type="tel" name="telephone" class="field-input"></div>
        <div class="full-row"><label>Parle-nous de ta boutique (produits, expérience...)</label><textarea name="message" rows="4" class="field-input"></textarea></div>
        <div class="full-row"><button type="submit" class="btn btn-primary">Envoyer ma demande</button></div>
        <p id="devenir-vendeur-feedback" class="full-row" style="color:var(--or-clair)"></p>
      </form>
    </div>`;

  document.getElementById('devenir-vendeur-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const form = e.target;
    const feedback = document.getElementById('devenir-vendeur-feedback');
    const btn = form.querySelector('button[type="submit"]');
    btn.disabled = true;
    const res = await API.post('demandeVendeurCreer', {
      nom: form.nom.value, boutique: form.boutique.value, email: form.email.value,
      telephone: form.telephone.value, message: form.message.value
    });
    if (res.success) {
      form.innerHTML = `<p class="full-row" style="color:var(--or-clair)">
        Merci ! Ta demande a été envoyée. Tu recevras un e-mail avec tes identifiants
        si elle est acceptée.</p>`;
    } else {
      feedback.style.color = '#e0554f';
      feedback.textContent = res.error || "Erreur lors de l'envoi.";
      btn.disabled = false;
    }
  });
}});
</script>
